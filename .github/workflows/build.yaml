name: Builder

env:
  BUILD_ARGS: "--test"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    name: Generate version
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +%Y.%-m.%-d).${{ github.run_number }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  build:
    runs-on: ubuntu-latest
    needs: version
    if: always() && (needs.version.result == 'success' || github.event_name == 'pull_request')
    name: Build ${{ matrix.arch }} add-on
    strategy:
      matrix:
        arch: ["amd64"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set version
        if: needs.version.outputs.version
        run: |
          sed -i "s/^version: .*/version: \"${{ needs.version.outputs.version }}\"/" ts_entities/config.yaml
          echo "Version set to ${{ needs.version.outputs.version }}"

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./ts_entities"

      - name: Check if add-on should be built
        id: check
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
            echo "build_arch=true" >> $GITHUB_OUTPUT;
            echo "image=$(echo ${{ steps.info.outputs.image }} | cut -d'/' -f3)" >> $GITHUB_OUTPUT;
            if [[ -z "${{ github.head_ref }}" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
                echo "BUILD_ARGS=" >> $GITHUB_ENV;
            fi
          else
            echo "${{ matrix.arch }} is not a valid arch for ts_entities, skipping build";
            echo "build_arch=false" >> $GITHUB_OUTPUT;
          fi

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/ts_entities \
            --image "${{ steps.check.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon

  update-version:
    runs-on: ubuntu-latest
    needs: [version, build]
    if: github.event_name == 'push' && needs.build.result == 'success'
    name: Update config version
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Update version in config.yaml
        run: |
          sed -i "s/^version: .*/version: \"${{ needs.version.outputs.version }}\"/" ts_entities/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ts_entities/config.yaml
          git diff --staged --quiet || git commit -m "[skip ci] Update version to ${{ needs.version.outputs.version }}"
          git push
